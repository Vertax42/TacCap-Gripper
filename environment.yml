# =============================================================================
# taccap-gripper development environment
# =============================================================================
#
# Create:    mamba env create -f environment.yml
# Activate:  mamba activate taccap
# Update:    mamba env update -f environment.yml
# =============================================================================

name: taccap

channels:
  - conda-forge

dependencies:
  # Build tools
  - cmake>=3.20
  - ninja
  - pkg-config
  - make

  # C++ toolchain
  - gcc=14.*
  - gxx=14.*
  - gcc_linux-64=14.*
  - gxx_linux-64=14.*

  # C++ deps. The Camera component links opencv_core + opencv_videoio; use
  # libopencv (C++ only) here. The Python cv2 binding is pinned via pip below
  # to opencv-python==4.12.0.88 to align with the rest of the XenseRobotics
  # Python toolchain (xense-flare etc.). spdlog (header-only) backs the shared
  # logger; it pulls in fmt as a transitive dep.
  - libopencv=4.12.0
  - spdlog=1.17.0

  # Testing
  - gtest=1.17.0

  # Python
  - python=3.12
  - pybind11
  - scikit-build-core
  - numpy
  - pyserial         # used in step 2+ for TC-GU-01 serial; pre-installed
  - pytest
  - ruff
  - pip
  - pip:
      - opencv-python==4.12.0.88   # pinned across XenseRobotics SDKs
      - rerun-sdk>=0.31           # multimodal visualisation (examples/)
